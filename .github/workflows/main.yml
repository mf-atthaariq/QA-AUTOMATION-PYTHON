name: 🚀 QA Automation CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  automation-test:
    name: 🧪 Run Web UI & Enterprise API Tests
    runs-on: ubuntu-latest

    steps:
      # 1. Tarik kode terbaru dari repository GitHub
      - name: 📁 Checkout Repository Code
        uses: actions/checkout@v4

      # 2. Siapkan Environment Python di server Ubuntu Cloud
      - name: 🐍 Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 🛠️ UPDATE: Install Core Dependencies + Ekstensi Parallel + ENGINE BDD
      - name: 📦 Install Core Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-html playwright requests jsonschema pytest-xdist pytest-bdd

      # 4. Download & Install biner browser headless bawaan Playwright di server cloud
      - name: 🌐 Install Playwright Web Browsers
        run: playwright install --with-deps

      # 5. Eksekusi Test Suite Secara Multi-Threading Lintas Core CPU (-n auto)
      - name: 🚀 Execute Complete Test Suite
        env:
          PYTHONPATH: "."
        run: pytest -v -s -n auto --html=report.html --self-contained-html

      # 6. Amankan file report.html agar tidak hilang saat server virtual dimatikan
      - name: 💾 Archive Automated Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-execution-report
          path: report.html
          retention-days: 7